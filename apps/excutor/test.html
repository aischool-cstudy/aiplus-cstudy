<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Excutor Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 24px; }
    h1 { font-size: 18px; margin-bottom: 16px; color: #9cdcfe; }

    .row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
    label { color: #808080; font-size: 13px; width: 90px; flex-shrink: 0; }
    input[type="text"] {
      background: #2d2d2d; border: 1px solid #3c3c3c; color: #d4d4d4;
      padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 13px;
      flex: 1;
    }

    textarea {
      width: 100%; background: #2d2d2d; border: 1px solid #3c3c3c;
      color: #d4d4d4; padding: 10px; border-radius: 4px;
      font-family: monospace; font-size: 13px; resize: vertical;
    }
    .code-area { margin-bottom: 12px; }
    .code-area label { display: block; color: #808080; font-size: 13px; margin-bottom: 6px; }

    button {
      background: #0e639c; color: #fff; border: none; padding: 8px 20px;
      border-radius: 4px; font-family: monospace; font-size: 13px; cursor: pointer;
    }
    button:hover { background: #1177bb; }
    button:disabled { background: #3c3c3c; color: #808080; cursor: not-allowed; }

    .result { margin-top: 20px; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 3px;
      font-size: 13px; font-weight: bold; margin-bottom: 12px;
    }
    .badge.pass { background: #1a4d1a; color: #4ec94e; }
    .badge.fail { background: #4d1a1a; color: #f44747; }

    .output-block { margin-bottom: 10px; }
    .output-block .title { font-size: 12px; color: #808080; margin-bottom: 4px; }
    pre {
      background: #252525; border: 1px solid #3c3c3c; border-radius: 4px;
      padding: 10px; font-size: 13px; white-space: pre-wrap; word-break: break-all;
      min-height: 36px; color: #d4d4d4;
    }
    pre.stderr { color: #f44747; }
    pre.empty { color: #555; font-style: italic; }

    .error-block { background: #3a1a1a; border: 1px solid #6b2020; border-radius: 4px; padding: 12px; }
    .error-block .code { color: #f44747; font-weight: bold; }
    .error-block .msg { color: #d4d4d4; margin-top: 4px; }

    .spinner { display: inline-block; width: 14px; height: 14px;
      border: 2px solid #3c3c3c; border-top-color: #9cdcfe;
      border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>▶ Excutor API Test — POST /v1/practice/run</h1>

  <div class="row">
    <label>server</label>
    <input type="text" id="server" value="http://localhost:8100" />
  </div>
  <div class="row">
    <label>problem_id</label>
    <input type="text" id="problem_id" value="p001" />
  </div>

  <div class="code-area">
    <label>code (Python)</label>
    <textarea id="code" rows="10">print("Hello, World!")

# 간단한 계산
result = sum(range(1, 101))
print(f"1~100 합: {result}")
</textarea>
  </div>

  <button id="run-btn" onclick="runCode()">실행</button>

  <div class="result hidden" id="result">
    <div id="status-badge"></div>
    <div class="output-block">
      <div class="title">stdout</div>
      <pre id="stdout"></pre>
    </div>
    <div class="output-block">
      <div class="title">stderr</div>
      <pre id="stderr" class="stderr"></pre>
    </div>
  </div>

  <div class="error-block hidden" id="error-block">
    <div class="code" id="error-code"></div>
    <div class="msg" id="error-msg"></div>
  </div>

  <script>
    async function runCode() {
      const btn = document.getElementById('run-btn');
      const server = document.getElementById('server').value.trim();
      const problem_id = document.getElementById('problem_id').value.trim();
      const code = document.getElementById('code').value;

      document.getElementById('result').classList.add('hidden');
      document.getElementById('error-block').classList.add('hidden');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>실행 중...';

      try {
        const res = await fetch(`${server}/v1/practice/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem_id, code }),
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById('error-block').classList.remove('hidden');
          document.getElementById('error-code').textContent =
            `error_code: ${data.error_code ?? res.status}`;
          document.getElementById('error-msg').textContent =
            data.message ?? JSON.stringify(data);
          return;
        }

        const badge = document.getElementById('status-badge');
        badge.className = `badge ${data.passed ? 'pass' : 'fail'}`;
        badge.textContent = data.passed ? '✓ PASSED' : '✗ FAILED';

        const stdoutEl = document.getElementById('stdout');
        stdoutEl.textContent = data.stdout || '';
        stdoutEl.className = data.stdout ? '' : 'empty';
        if (!data.stdout) stdoutEl.textContent = '(no output)';

        const stderrEl = document.getElementById('stderr');
        stderrEl.textContent = data.stderr || '';
        stderrEl.className = data.stderr ? 'stderr' : 'empty';
        if (!data.stderr) stderrEl.textContent = '(no output)';

        document.getElementById('result').classList.remove('hidden');
      } catch (e) {
        document.getElementById('error-block').classList.remove('hidden');
        document.getElementById('error-code').textContent = 'fetch error';
        document.getElementById('error-msg').textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '실행';
      }
    }
  </script>
</body>
</html>
